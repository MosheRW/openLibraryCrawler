queries:
  - query: "python programming"
    max_year: 2024
    limit: 10
  - query: "data science"
    max_year: 2024
    limit: 10
    shelf: "want-to-read"
  - query: "romance novels"
    max_year: 2024
    limit: 10
    shelf: "already-read"
  - query: "history books"
    max_year: 2024
    limit: 10
settings:
  headless: true
  output_format: "json"
  output_directory: "results"
  initialize_book_shelves: true
  print_info: true
  save_results: true
  log_level: "INFO"
  log_file: "app.log"
  thresholds:
    search_results_ms: 3000
    book_ms: 2500
    profile_ms: 2000